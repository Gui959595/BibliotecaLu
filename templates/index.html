<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
   
    <title>HOME</title>
</head>
<body>
    <header>
        <div class="logo">Minha Logo</div>
        <nav>
            <a href="form">CADASTRO</a>
            <a href="/">PÁGINA 2</a>
            <a href="#">PÁGINA 3</a>
        </nav>
    </header>
    
    <h1>Livros Cadastrados</h1>

    <table class="tabela">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Autor</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
        {% for Livro in Livros %}
            <tr>
                <td>{{ Livro.nome }}</td>
                <td>{{ Livro.autor }}</td>
                <td class="acoes">
                    <form action="/deletar/{{ Livro.id }}" method="POST">
                        <button class="btn-deletar" type="submit">Excluir</button>
                    </form>

                    <a href="/form?id={{ Livro.id }}">
                        <button class="btn-editar" type="button">Editar</button>
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    
    <div class="container">
        <img class="card-img" src="/static/it.jpg" alt="">
    </div>

    <footer class="main-footer">
        <p>&copy; 2026. Todos os direitos reservados.</p>
        <nav>
            <a href="#">Política de Privacidade</a> |
            <a href="#">Termos de Serviço</a> |
            <a href="#">Contato</a>
        </nav>
    </footer>
    
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
